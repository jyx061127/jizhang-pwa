<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="记账本">
<title>记账本</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#27ae60;--red:#e74c3c;--bg:#f5f6fa;--card:#fff;--text:#2c3e50;--sub:#7f8c8d;--border:#ecf0f1}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px}
.header{background:var(--card);padding:16px 20px;position:sticky;top:0;z-index:10;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.header h1{font-size:20px;text-align:center;font-weight:700}
.summary{display:flex;gap:10px;padding:16px 16px 8px}
.summary-card{flex:1;background:var(--card);border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.summary-card .label{font-size:12px;color:var(--sub);margin-bottom:4px}
.summary-card .value{font-size:20px;font-weight:700}
.summary-card .value.income{color:var(--green)}
.summary-card .value.expense{color:var(--red)}
.summary-card .value.balance{color:var(--text)}
.fab{position:fixed;bottom:24px;right:50%;transform:translateX(220px);width:52px;height:52px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(39,174,96,.4);z-index:20;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.fab:active{transform:translateX(220px) scale(.95)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:18px;margin-bottom:16px;text-align:center}
.type-toggle{display:flex;margin-bottom:16px;border-radius:10px;overflow:hidden}
.type-toggle button{flex:1;padding:10px;border:1px solid var(--border);background:#fff;font-size:15px;cursor:pointer;transition:all .2s}
.type-toggle button:first-child{border-radius:10px 0 0 10px}
.type-toggle button:last-child{border-radius:0 10px 10px 0}
.type-toggle button.active.income{background:var(--green);color:#fff;border-color:var(--green)}
.type-toggle button.active.expense{background:var(--red);color:#fff;border-color:var(--red)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--sub);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;outline:none;background:#fafafa}
.form-group input:focus,.form-group select:focus{border-color:var(--green);background:#fff}
.cat-grid{display:flex;flex-wrap:wrap;gap:8px}
.cat-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:13px;cursor:pointer;transition:all .2s;background:#fff}
.cat-chip.selected{border-color:var(--green);background:#e8f8f0;color:var(--green)}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:12px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;border:none;transition:opacity .2s}
.btn:active{opacity:.8}
.btn-primary{background:var(--green);color:#fff}
.btn-cancel{background:var(--border);color:var(--text)}
.list-section{padding:0 16px}
.section-title{font-size:14px;color:var(--sub);padding:12px 0 8px}
.txn-item{background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.txn-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.txn-icon.income{background:#e8f8f0}
.txn-icon.expense{background:#fdeaea}
.txn-info{flex:1;min-width:0}
.txn-info .cat{font-size:15px;font-weight:500}
.txn-info .note{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-amount{font-size:17px;font-weight:700;text-align:right}
.txn-amount.income{color:var(--green)}
.txn-amount.expense{color:var(--red)}
.txn-date{font-size:11px;color:var(--sub);text-align:right}
.txn-del{color:#ccc;font-size:18px;cursor:pointer;padding:4px;flex-shrink:0}
.txn-del:active{color:var(--red)}
.empty{padding:40px;text-align:center;color:var(--sub);font-size:14px}
.tab-bar{display:flex;background:var(--card);position:sticky;top:52px;z-index:9;padding:4px;margin:0 16px 8px;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tab-bar button{flex:1;padding:8px;border:none;background:none;font-size:13px;border-radius:8px;cursor:pointer;transition:all .2s}
.tab-bar button.active{background:var(--green);color:#fff}
</style>
</head>
<body>

<div class="header"><h1>记账本</h1></div>

<div class="summary">
  <div class="summary-card"><div class="label">收入</div><div class="value income" id="totalIncome">¥0</div></div>
  <div class="summary-card"><div class="label">支出</div><div class="value expense" id="totalExpense">¥0</div></div>
  <div class="summary-card"><div class="label">结余</div><div class="value balance" id="balance">¥0</div></div>
</div>

<div class="tab-bar">
  <button class="active" data-month="current">本月</button>
  <button data-month="0">1月</button><button data-month="1">2月</button><button data-month="2">3月</button>
  <button data-month="3">4月</button><button data-month="4">5月</button><button data-month="5">6月</button>
  <button data-month="6">7月</button><button data-month="7">8月</button><button data-month="8">9月</button>
  <button data-month="9">10月</button><button data-month="10">11月</button><button data-month="11">12月</button>
</div>

<div class="list-section"><div id="txnList"></div></div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay">
<div class="modal">
  <h2>记一笔</h2>
  <div class="type-toggle">
    <button class="active income" id="btnIncome" onclick="setType('income')">💰 收入</button>
    <button class="expense" id="btnExpense" onclick="setType('expense')">💸 支出</button>
  </div>
  <div class="form-group"><label>金额</label><input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01"></div>
  <div class="form-group">
    <label>分类</label>
    <div class="cat-grid" id="catGrid"></div>
  </div>
  <div class="form-group"><label>日期</label><input type="date" id="date"></div>
  <div class="form-group"><label>备注</label><input type="text" id="note" placeholder="选填"></div>
  <div class="btn-row">
    <button class="btn btn-cancel" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="saveTxn()">保存</button>
  </div>
</div>
</div>

<script>
const INCOME_CATS = ['工资','兼职','理财','红包','报销','其他'];
const INCOME_ICONS = {'工资':'💼','兼职':'💪','理财':'📈','红包':'🧧','报销':'📋','其他':'💰'};
const EXPENSE_CATS = ['餐饮','交通','购物','住房','娱乐','医疗','教育','日用','其他'];
const EXPENSE_ICONS = {'餐饮':'🍜','交通':'🚌','购物':'🛍','住房':'🏠','娱乐':'🎮','医疗':'💊','教育':'📚','日用':'🧴','其他':'💸'};

let type = 'expense';
let category = '';
let currentMonth = new Date().getMonth();

function LS(k,v){if(v!==undefined){localStorage.setItem(k,JSON.stringify(v));return v}try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function getTxns(){return LS('txns')||[]}

function setType(t){type=t;document.getElementById('btnIncome').classList.toggle('active',t==='income');document.getElementById('btnExpense').classList.toggle('active',t==='expense');renderCats()}

function renderCats(){
  var cats = type==='income'?INCOME_CATS:EXPENSE_CATS;
  var icons = type==='income'?INCOME_ICONS:EXPENSE_ICONS;
  if(!category || !cats.includes(category)) category = '';
  var h = cats.map(function(c){
    return '<span class="cat-chip'+(c===category?' selected':'')+'" onclick="pickCat(\''+c+'\')">'+icons[c]+' '+c+'</span>';
  }).join('');
  document.getElementById('catGrid').innerHTML = h;
}

function pickCat(c){category=c;renderCats()}

function openModal(){
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('amount').value='';
  document.getElementById('note').value='';
  document.getElementById('date').value=new Date().toISOString().slice(0,10);
  category='';
  setType('expense');
  setTimeout(function(){document.getElementById('amount').focus()},300);
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}

function saveTxn(){
  var amt = parseFloat(document.getElementById('amount').value);
  if(!amt||amt<=0){alert('请输入金额');return}
  if(!category){alert('请选择分类');return}
  var txn = {id:Date.now(),type:type,amount:amt,category:category,date:document.getElementById('date').value,note:document.getElementById('note').value};
  var txns = getTxns();txns.unshift(txn);LS('txns',txns);
  closeModal();renderAll();
}

function delTxn(id){if(confirm('确定删除？')){var txns=getTxns().filter(function(t){return t.id!==id});LS('txns',txns);renderAll()}}

function renderAll(){
  var txns = getTxns();
  var filtered = txns.filter(function(t){return new Date(t.date).getMonth()===currentMonth});
  var income = 0, expense = 0;
  filtered.forEach(function(t){if(t.type==='income') income+=t.amount; else expense+=t.amount});
  document.getElementById('totalIncome').textContent = '¥'+income.toFixed(2);
  document.getElementById('totalExpense').textContent = '¥'+expense.toFixed(2);
  document.getElementById('balance').textContent = '¥'+(income-expense).toFixed(2);
  var icons = type==='income'?INCOME_ICONS:EXPENSE_ICONS;
  var allIcons = Object.assign({}, INCOME_ICONS, EXPENSE_ICONS);
  if(filtered.length===0){
    document.getElementById('txnList').innerHTML='<div class="empty">📝 暂无记录，点下方 + 开始记账</div>';
  } else {
    document.getElementById('txnList').innerHTML = filtered.map(function(t){
      var cls = t.type==='income'?'income':'expense';
      var prefix = t.type==='income'?'+':'-';
      return '<div class="txn-item">'+
        '<div class="txn-icon '+cls+'">'+(allIcons[t.category]||'💰')+'</div>'+
        '<div class="txn-info"><div class="cat">'+t.category+'</div><div class="note">'+(t.note||t.date)+'</div></div>'+
        '<div><div class="txn-amount '+cls+'">'+prefix+'¥'+t.amount.toFixed(2)+'</div><div class="txn-date">'+t.date+'</div></div>'+
        '<span class="txn-del" onclick="delTxn('+t.id+')">✕</span>'+
        '</div>';
    }).join('');
  }
}

function switchMonth(m){
  var btns = document.querySelectorAll('.tab-bar button');
  btns.forEach(function(b){b.classList.remove('active')});
  if(m==='current'){currentMonth=new Date().getMonth();btns[0].classList.add('active')}
  else {currentMonth=parseInt(m);btns[parseInt(m)+1].classList.add('active')}
  renderAll();
}

document.querySelector('.tab-bar').addEventListener('click',function(e){
  if(e.target.tagName==='BUTTON') switchMonth(e.target.dataset.month);
});

document.getElementById('modalOverlay').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

// Init
var now = new Date();
document.querySelectorAll('.tab-bar button').forEach(function(b){
  if(b.dataset.month==='current') b.textContent = '本月('+(now.getMonth()+1)+'月)';
});
switchMonth('current');

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
